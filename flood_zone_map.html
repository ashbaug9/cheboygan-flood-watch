<script>
'use strict';
// ═══ COORDINATE SYSTEM ═══
const MAP_L=30, MAP_T=108, MAP_W=840, MAP_H=790;
const MAP_R=MAP_L+MAP_W, MAP_B=MAP_T+MAP_H;
const LAT0=45.624, LAT1=45.676, LON0=-84.497, LON1=-84.432;
const LS=MAP_H/(LAT1-LAT0), NS=MAP_W/(LON1-LON0);

function px(lat,lng){
  return [MAP_L+(lng-LON0)*NS, MAP_B-(lat-LAT0)*LS];
}

// ═══ CONFIRMED RCL (fishweb GPS anchors + interpolation) ═══
const RCL=[
  [45.63606,-84.479615],  // Dam (Google Maps confirmed)
  [45.636198,-84.479329], // Flow projection 55.4°NE (Google Maps confirmed)
  [45.639009,-84.477713],
  [45.641819,-84.476096],
  [45.64463,-84.47448],  // State Street (fishweb)
  [45.64741,-84.47188],
  [45.65018,-84.46928],[45.65296,-84.46668],[45.65573,-84.46408],
  [45.65851,-84.46147],[45.66128,-84.45887],[45.66406,-84.45627],
  [45.66683,-84.45367]
];

// ═══ BISECTOR BUFFER ═══
function buf(pts,h){
  if(pts.length<2)return[];
  const L=[],R=[];
  for(let i=0;i<pts.length;i++){
    const prev=pts[Math.max(0,i-1)],curr=pts[i],next=pts[Math.min(pts.length-1,i+1)];
    const t1=[curr[0]-prev[0],curr[1]-prev[1]],l1=Math.sqrt(t1[0]**2+t1[1]**2)||1;
    const tn1=[t1[0]/l1,t1[1]/l1];
    const t2=[next[0]-curr[0],next[1]-curr[1]],l2=Math.sqrt(t2[0]**2+t2[1]**2)||1;
    const tn2=[t2[0]/l2,t2[1]/l2];
    const bx=tn1[0]+tn2[0],by=tn1[1]+tn2[1],bl=Math.sqrt(bx**2+by**2)||1;
    const bn=[bx/bl,by/bl],nx=-bn[1],ny=bn[0];
    const c=tn1[0]*bn[0]+tn1[1]*bn[1],sc=Math.min(1/Math.max(c,0.2),5);
    L.push([curr[0]+nx*h*sc,curr[1]+ny*h*sc]);
    R.push([curr[0]-nx*h*sc,curr[1]-ny*h*sc]);
  }
  return [...L,...[...R].reverse()];
}

// ═══ SVG PATH HELPERS ═══
function pts2path(latLngPoly){
  return latLngPoly.map((pt,i)=>{
    const [x,y]=px(pt[0],pt[1]);
    return`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ')+'Z';
}

function pts2polyline(latLngs){
  return latLngs.map((pt,i)=>{
    const [x,y]=px(pt[0],pt[1]);
    return`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
}

function svgEl(tag,attrs,text){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  if(text!==undefined) el.textContent=text;
  return el;
}

function addPath(parent,d,attrs){ parent.appendChild(svgEl('path',{d,...attrs})); }
function addRect(parent,attrs){ parent.appendChild(svgEl('rect',attrs)); }
function addText(parent,x,y,txt,attrs){
  const el=svgEl('text',{x,y,...attrs});el.textContent=txt;parent.appendChild(el);return el;
}
function addLine(parent,x1,y1,x2,y2,attrs){ parent.appendChild(svgEl('line',{x1,y1,x2,y2,...attrs})); }

// ═══ RENDER MAP ═══
const g=document.getElementById('map-content');

// ── Lake Huron (top of map) ──
const lakeY=px(45.671,LON0)[1];
addRect(g,{x:MAP_L,y:MAP_T,width:MAP_W,height:lakeY-MAP_T,fill:'#b8d8f0'});
// Lake Huron label
addText(g,MAP_L+MAP_W/2,MAP_T+20,'LAKE HURON',{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'16','font-weight':'600','fill':'#2a5a8a','letter-spacing':'3'});

// ── Slight urban tint over land ──
addRect(g,{x:MAP_L,y:lakeY,width:MAP_W,height:MAP_B-lakeY,fill:'#eae5d8'});

// Subtle grid/block texture for urban area
// (light grey rectangles for city blocks — approximate)
const blockColor='rgba(210,200,185,0.5)';
// A few rough urban block regions
for(let y=lakeY;y<MAP_B-40;y+=32){
  addLine(g,MAP_L,y,MAP_R,y,'stroke-width','0.3','stroke','rgba(180,170,155,0.3)');
}

// ── Zone 3 ──
const z3=buf(RCL,0.00600);
addPath(g,pts2path(z3),{fill:'rgba(190,150,0,0.22)',stroke:'#c8a000','stroke-width':'1.5','stroke-dasharray':'7 4'});
addPath(g,pts2path(z3),{fill:'url(#hatch3)',opacity:'0.6'});

// ── Zone 2 ──
const z2=buf(RCL,0.00210);
addPath(g,pts2path(z2),{fill:'rgba(210,100,20,0.38)',stroke:'#c86010','stroke-width':'1.5'});
addPath(g,pts2path(z2),{fill:'url(#hatch2)',opacity:'0.7'});

// ── Zone 1 ──
const z1=buf(RCL,0.00080);
addPath(g,pts2path(z1),{fill:'rgba(200,40,30,0.55)',stroke:'#c02010','stroke-width':'2'});
addPath(g,pts2path(z1),{fill:'url(#hatch1)',opacity:'0.8'});

// ── River channel ──
const river=buf(RCL,0.00027);
addPath(g,pts2path(river),{fill:'#5a9ec8',stroke:'#2a6a98','stroke-width':'1'});

// ── Streets ──
const stW={'stroke-width':'1','stroke':'#b8b0a0','fill':'none'};
const stMain={'stroke-width':'1.5','stroke':'#a0988a','fill':'none'};
const stUS23={'stroke-width':'2.5','stroke':'#8a7a6a','fill':'none'};

// East-West streets (approximate latitudes from city layout)
const ewStreets=[
  {lat:45.668,name:'Front St',bold:false},
  {lat:45.663,name:'Lake St',bold:false},
  {lat:45.659,name:'W 1st St',bold:false},
  {lat:45.654,name:'Division St',bold:true},
  {lat:45.650,name:'Pine St',bold:false},
  {lat:45.647,name:'Elm St',bold:false},
  {lat:45.644,name:'7th St',bold:false},
  {lat:45.641,name:'Seymour St',bold:false},
  {lat:45.638,name:'Williams St',bold:false},
  {lat:45.635,name:'Lincoln Ave',bold:true},
  {lat:45.631,name:'Taylor St',bold:false},
];
ewStreets.forEach(s=>{
  const [,y]=px(s.lat,LON0);
  const style=s.bold?stMain:stW;
  addPath(g,`M${MAP_L},${y.toFixed(1)}L${MAP_R},${y.toFixed(1)}`,style);
  // Street label
  addText(g,MAP_L+3,y-3,s.name,{'font-family':'Source Sans 3,sans-serif','font-size':s.bold?'9.5':'8.5','fill':'#776858','font-weight':s.bold?'600':'400'});
});

// North-South streets (approximate longitudes)
const nsStreets=[
  {lng:-84.487,name:'N Western Ave',bold:false},
  {lng:-84.481,name:'N Huron St',bold:false},
  {lng:-84.477,name:'N Main St',bold:true},
  {lng:-84.473,name:'N B St',bold:false},
  {lng:-84.470,name:'N C St',bold:false},
  {lng:-84.466,name:'N D St',bold:false},
  {lng:-84.462,name:'N E St',bold:false},
  {lng:-84.454,name:'Lafayette Ave',bold:false},
];
nsStreets.forEach(s=>{
  const [x]=px(LAT0,s.lng);
  const style=s.bold?stMain:stW;
  addPath(g,`M${x.toFixed(1)},${MAP_T}L${x.toFixed(1)},${MAP_B}`,style);
  // Label (rotated)
  const tEl=svgEl('text',{'transform':`rotate(-90,${x.toFixed(1)},${MAP_B-4})`,'x':x,'y':MAP_B-4,'font-family':'Source Sans 3,sans-serif','font-size':s.bold?'9':'8','fill':'#776858','font-weight':s.bold?'600':'400','text-anchor':'start'});
  tEl.textContent=s.name;g.appendChild(tEl);
});

// US-23 route (thicker, distinctive)
// Runs from south, crosses bascule bridge, continues north
const us23=[
  [45.627,-84.487],[45.630,-84.486],[45.635,-84.484],[45.640,-84.482],
  [45.644,-84.480],[45.647,-84.477],[45.6476,-84.4697],[45.649,-84.466],
  [45.652,-84.464],[45.655,-84.461],[45.659,-84.457],[45.664,-84.452],[45.668,-84.448]
];
addPath(g,pts2polyline(us23),{...stUS23,'stroke-dasharray':'none'});
const [us23lx,us23ly]=px(45.636,-84.487);
addText(g,us23lx-4,us23ly,'US-23',{'font-family':'Oswald,sans-serif','font-size':'10','font-weight':'700','fill':'#6a5a4a','letter-spacing':'1'});

// ── River centerline (thin dashed for reference) ──
addPath(g,pts2polyline(RCL),{'stroke':'rgba(255,255,255,0.5)','stroke-width':'1','stroke-dasharray':'5 3','fill':'none'});

// "CHEBOYGAN RIVER" label along river
const [rlx1,rly1]=px(45.646,-84.471);
const [rlx2,rly2]=px(45.660,-84.460);
const riverLabelPath=document.getElementById('river-label-path');
riverLabelPath.setAttribute('d',`M${rlx1.toFixed(1)},${rly1.toFixed(1)}L${rlx2.toFixed(1)},${rly2.toFixed(1)}`);
const textPath=svgEl('text',{'font-family':'Source Sans 3,sans-serif','font-size':'10','font-weight':'700','fill':'white','letter-spacing':'3','filter':'url(#shadow)'});
const tp=svgEl('textPath',{'href':'#river-label-path','startOffset':'10%'});
tp.textContent='CHEBOYGAN RIVER';textPath.appendChild(tp);g.appendChild(textPath);

// ── Zone Annotation Labels ──
// Each label: zone name, depth, time
function addZoneLabel(lat,lng,lines,color,bgColor){
  const [x,y]=px(lat,lng);
  const lh=15, pad=6, lw=Math.max(...lines.map(l=>l.length))*6.2;
  const bh=lines.length*lh+pad*2;
  addRect(g,{x:x-lw/2,y:y-bh/2,width:lw,height:bh,rx:'4',fill:bgColor,'stroke':color,'stroke-width':'1.5',filter:'url(#shadow)'});
  lines.forEach((line,i)=>{
    addText(g,x,y-bh/2+pad+lh*(i+0.8),line,{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'11','font-weight':'600','fill':color});
  });
}

// Zone 1 label (near dam — most critical)
addZoneLabel(45.641,-84.476,['ZONE 1 — EVACUATE','4–8 ft depth','0–15 min from breach'],'#c82010','rgba(255,240,238,0.95)');

// Zone 2 label (mid-city)
addZoneLabel(45.650,-84.473,['ZONE 2 — HIGH RISK','2–4 ft depth','30–90 min from breach'],'#c86010','rgba(255,245,235,0.95)');

// Zone 3 label (outer)
addZoneLabel(45.659,-84.481,['ZONE 3 — WATCH','0.5–2 ft depth','1.5–3 hrs from breach'],'#968000','rgba(255,252,230,0.95)');

// Zone 3 label east side
addZoneLabel(45.655,-84.457,['ZONE 3 — WATCH','0.5–2 ft depth','1.5–3 hrs from breach'],'#968000','rgba(255,252,230,0.95)');

// ── Key Markers ──
// Dam
const [damX,damY]=px(45.636060,-84.479615);
addPath(g,`M${damX-14},${damY}L${damX+14},${damY}M${damX},${damY-6}L${damX},${damY+6}`,{'stroke':'#c82010','stroke-width':'3','fill':'none'});
addRect(g,{x:damX-52,y:damY-34,width:104,height:30,rx:'4',fill:'#c82010'});
addText(g,damX,damY-24,'⚠ CHEBOYGAN DAM',{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'11','font-weight':'700','fill':'white'});
addText(g,damX,damY-11,'Reservoir: 592.85 ft MSL',{'text-anchor':'middle','font-family':'Source Sans 3,sans-serif','font-size':'8.5','fill':'rgba(255,220,210,0.95)'});
// Dam crest line (horizontal bar across map)
addLine(g,MAP_L,damY,MAP_R,damY,'stroke','rgba(200,40,30,0.3)','stroke-width','1','stroke-dasharray','3 3');

// River mouth
const [mouthX,mouthY]=px(45.66683,-84.45367);
const mouthGrad=svgEl('circle',{cx:mouthX,cy:mouthY,r:'8',fill:'#2a6a98',stroke:'white','stroke-width':'2'});
g.appendChild(mouthGrad);
addText(g,mouthX,mouthY+20,'River mouth · Lake Huron',{'text-anchor':'middle','font-family':'Source Sans 3,sans-serif','font-size':'9','fill':'#2a5a8a','font-weight':'600'});
addText(g,mouthX,mouthY+31,'581 ft MSL (WSE boundary)',{'text-anchor':'middle','font-family':'Source Sans 3,sans-serif','font-size':'8','fill':'#4a7a9a'});

// US-23 Bascule Bridge (RAISED)
const [brX,brY]=px(45.6476,-84.4697);
addRect(g,{x:brX-55,y:brY-13,width:110,height:24,rx:'4',fill:'rgba(200,40,30,0.12)',stroke:'#c82010','stroke-width':'1.2'});
addText(g,brX,brY+3,'🚫 US-23 BRIDGE — RAISED',{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'9.5','font-weight':'700','fill':'#c82010'});

// Lincoln Ave Bridge (detour)
const [linX,linY]=px(45.6356,-84.4822);
addRect(g,{x:linX-62,y:linY-13,width:124,height:26,rx:'4',fill:'rgba(0,120,40,0.1)',stroke:'#2a8a40','stroke-width':'1.2'});
addText(g,linX,linY,'🌉 LINCOLN AVE — DETOUR',{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'9.5','font-weight':'700','fill':'#2a8a40'});
addText(g,linX,linY+11,'(upstream of dam — safe)',{'text-anchor':'middle','font-family':'Source Sans 3,sans-serif','font-size':'8','fill':'#4aaa60'});

// Evacuation arrows
const evac=[
  {from:[45.630,-84.486],to:[45.626,-84.488],label:'↑ N evacuation'},
  {from:[45.630,-84.492],to:[45.630,-84.497],label:'← W evacuation'},
];
evac.forEach(e=>{
  const [fx,fy]=px(e.from[0],e.from[1]);
  const [tx,ty]=px(e.to[0],e.to[1]);
  addPath(g,`M${fx.toFixed(1)},${fy.toFixed(1)}L${tx.toFixed(1)},${ty.toFixed(1)}`,
    {'stroke':'#2a8a40','stroke-width':'2.5','fill':'none','marker-end':'url(#arrow-evac)'});
  addText(g,(fx+tx)/2-5,(fy+ty)/2-5,e.label,{'font-family':'Source Sans 3,sans-serif','font-size':'9','font-weight':'700','fill':'#2a8a40'});
});

// ── North Arrow ──
const [nax,nay]=[MAP_R-46,MAP_T+68];
addPath(g,`M${nax},${nay-22}L${nax-9},${nay+5}L${nax},${nay}Z`,{fill:'#1a1a2e'});
addPath(g,`M${nax},${nay-22}L${nax+9},${nay+5}L${nax},${nay}Z`,{fill:'white',stroke:'#aaa','stroke-width':'0.5'});
addPath(g,`M${nax},${nay}L${nax-9},${nay+5}L${nax},${nay+22}Z`,{fill:'white',stroke:'#aaa','stroke-width':'0.5'});
addPath(g,`M${nax},${nay}L${nax+9},${nay+5}L${nax},${nay+22}Z`,{fill:'#1a1a2e'});
addText(g,nax,nay-27,'N',{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'14','font-weight':'700','fill':'#1a1a2e'});
addRect(g,{x:MAP_R-70,y:MAP_T+36,width:60,height:60,rx:'4',fill:'rgba(255,255,255,0.7)',stroke:'#ccc','stroke-width':'0.5'});

// ── Scale Bar ──
// 1000 ft = 1000/3.281 = 305m. In lon deg: 305/(111000*cos(45.65)) = 305/77700 = 0.00393 deg
const scaleLeftLng=-84.488;
const scaleRightLng=scaleLeftLng+0.00393; // 1000 ft
const [scx1,scy]=px(45.628,scaleLeftLng);
const [scx2]=px(45.628,scaleRightLng);
const scY=MAP_B-28;
addPath(g,`M${scx1},${scY}L${scx2},${scY}`,{'stroke':'#1a1a2e','stroke-width':'3','fill':'none'});
addPath(g,`M${scx1},${scY-5}L${scx1},${scY+5}`,{'stroke':'#1a1a2e','stroke-width':'2','fill':'none'});
addPath(g,`M${scx2},${scY-5}L${scx2},${scY+5}`,{'stroke':'#1a1a2e','stroke-width':'2','fill':'none'});
addPath(g,`M${scx1},${scY}L${(scx1+scx2)/2},${scY}`,{'stroke':'#1a1a2e','stroke-width':'5','fill':'none'});
addText(g,scx1,scY-8,'0',{'text-anchor':'middle','font-family':'Source Sans 3,sans-serif','font-size':'9','fill':'#1a1a2e'});
addText(g,(scx1+scx2)/2,scY-8,'500 ft',{'text-anchor':'middle','font-family':'Source Sans 3,sans-serif','font-size':'9','fill':'#1a1a2e'});
addText(g,scx2,scY-8,'1,000 ft',{'text-anchor':'middle','font-family':'Source Sans 3,sans-serif','font-size':'9','fill':'#1a1a2e'});

// ── Coordinate graticule tick labels ──
[45.630,45.640,45.650,45.660,45.670].forEach(lat=>{
  const [,y]=px(lat,-84.497);
  addText(g,MAP_L-2,y+3,lat.toFixed(3)+'°N',{'text-anchor':'end','font-family':'Source Sans 3,sans-serif','font-size':'8','fill':'#aaa'});
  addLine(g,MAP_L-4,y,MAP_L,y,'stroke','#aaa','stroke-width','0.5');
});

// Map border
addRect(g,{x:MAP_L,y:MAP_T,width:MAP_W,height:MAP_H,fill:'none',stroke:'#888','stroke-width':'1.5'});

// ── "CITY OF CHEBOYGAN" label ──
const [chwx,chwy]=px(45.651,-84.468);
addText(g,chwx,chwy,'CITY OF CHEBOYGAN',{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'18','font-weight':'400','fill':'rgba(60,50,40,0.2)','letter-spacing':'4'});

// Projection note
addText(g,MAP_R-5,MAP_B-5,'WGS84 / Approx. projection',{'text-anchor':'end','font-family':'Source Sans 3,sans-serif','font-size':'7.5','fill':'#aaa'});

// Timing annotation box (dam-side)
const [tax,tay]=px(45.645,-84.493);
addRect(g,{x:MAP_L+4,y:tay-50,width:155,height:55,rx:'5',fill:'rgba(255,255,255,0.93)',stroke:'#bbb','stroke-width':'1'});
addText(g,MAP_L+82,tay-38,'PARTIAL BREACH TIMELINE',{'text-anchor':'middle','font-family':'Oswald,sans-serif','font-size':'9','font-weight':'700','fill':'#555','letter-spacing':'0.5'});
addText(g,MAP_L+10,tay-24,'Dam failure → downtown:',{'font-family':'Source Sans 3,sans-serif','font-size':'9.5','fill':'#333'});
addText(g,MAP_L+153,tay-24,'5–15 min',{'text-anchor':'end','font-family':'Oswald,sans-serif','font-size':'10','font-weight':'700','fill':'#c82010'});
addText(g,MAP_L+10,tay-11,'Peak discharge (Froehlich):',{'font-family':'Source Sans 3,sans-serif','font-size':'9.5','fill':'#333'});
addText(g,MAP_L+153,tay-11,'17,500 cfs',{'text-anchor':'end','font-family':'Oswald,sans-serif','font-size':'10','font-weight':'700','fill':'#c86010'});
addText(g,MAP_L+10,tay+2,'WSE at dam (surge + sat.):',{'font-family':'Source Sans 3,sans-serif','font-size':'9.5','fill':'#333'});
addText(g,MAP_L+153,tay+2,'590 ft MSL',{'text-anchor':'end','font-family':'Oswald,sans-serif','font-size':'10','font-weight':'700','fill':'#886000'});

</script>
